name: workout_app
description: "7-Minute Workout App - Guided fitness timer with progress tracking."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1

  # Firebase
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.1
  cloud_firestore: ^5.6.5
  firebase_messaging: ^15.2.4

  # Google Sign-In
  google_sign_in: ^6.2.2

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.3.4

  # Notifications
  flutter_local_notifications: ^18.0.1

  # Audio
  audioplayers: ^6.1.0

  # Charts
  fl_chart: ^0.70.2

  # Animations
  lottie: ^3.3.1

  # Health
  health: ^12.0.0

  # Ads & In-App Purchase
  google_mobile_ads: ^5.3.0
  in_app_purchase: ^3.2.0

  # Utilities
  uuid: ^4.5.1
  intl: ^0.20.2
  wakelock_plus: ^1.2.10
  percent_indicator: ^4.2.3
  timezone: ^0.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13

flutter:
  uses-material-design: true

  assets:
    - assets/animations/
    - assets/audio/
    - assets/images/
